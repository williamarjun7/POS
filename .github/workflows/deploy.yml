name: Deploy POS

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:

      - name: Deploy to server
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: 22
          script: |
            set -e
            cd /var/www/pos
            echo "=== Deploying $(date) ==="
            echo "Current commit: $(git -C /var/www/pos log --oneline -1 || echo 'unknown')"
            sudo git fetch origin main
            sudo git reset --hard origin/main
            echo "Updated to: $(git -C /var/www/pos log --oneline -1)"
            sudo npm install
            sudo VITE_INSFORGE_URL='${{ secrets.VITE_INSFORGE_URL }}' \
              VITE_INSFORGE_ANON_KEY='${{ secrets.VITE_INSFORGE_ANON_KEY }}' \
              VITE_INSFORGE_FUNCTIONS_URL='${{ secrets.VITE_INSFORGE_FUNCTIONS_URL }}' \
              VITE_FONEPAY_MERCHANT_CODE='${{ secrets.VITE_FONEPAY_MERCHANT_CODE }}' \
              VITE_FONEPAY_API_BASE_URL='${{ secrets.VITE_FONEPAY_API_BASE_URL }}' \
              npx vite build
            sudo systemctl reload nginx
            echo "Deploy complete! Now serving: $(git -C /var/www/pos log --oneline -1)"
