name: Deploy POS

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to server
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: 22
          script: |
            cd /var/www/pos
            sudo git pull origin main
            sudo npm install
            sudo VITE_INSFORGE_URL='${{ secrets.VITE_INSFORGE_URL }}' \
              VITE_INSFORGE_ANON_KEY='${{ secrets.VITE_INSFORGE_ANON_KEY }}' \
              VITE_FONEPAY_MERCHANT_CODE='${{ secrets.VITE_FONEPAY_MERCHANT_CODE }}' \
              VITE_FONEPAY_API_BASE_URL='${{ secrets.VITE_FONEPAY_API_BASE_URL }}' \
              npx vite build
            sudo systemctl reload nginx
            echo "Deploy complete!"
